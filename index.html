<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Projects</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .container { display: flex; flex-wrap: wrap; gap: 1rem; padding: 1rem; }
        .project-card { border: 1px solid #ccc; border-radius: 8px; overflow: hidden; width: calc(33.333% - 1rem); }
        .project-card img { width: 100%; height: auto; }
        .project-details { padding: 1rem; }
        .project-title { font-size: 1.2em; margin: 0; }
        .project-location, .project-price { margin: 0.5em 0; }
    </style>
</head>
<body>
    <h1>Real Estate Projects</h1>
    <div class="container">
        <div class="project-card">
            <img src="image1.jpg" alt="Project 1">
            <div class="project-details">
                <h2 class="project-title">Project Title 1</h2>
                <p class="project-location">Location: City A</p>
                <p class="project-price">Price: $500,000</p>
            </div>
        </div>
        <div class="project-card">
            <img src="image2.jpg" alt="Project 2">
            <div class="project-details">
                <h2 class="project-title">Project Title 2</h2>
                <p class="project-location">Location: City B</p>
                <p class="project-price">Price: $600,000</p>
            </div>
        </div>
        <div class="project-card">
            <img src="image3.jpg" alt="Project 3">
            <div class="project-details">
                <h2 class="project-title">Project Title 3</h2>
                <p class="project-location">Location: City C</p>
                <p class="project-price">Price: $700,000</p>
            </div>
        </div>
    </div>
</body>
</html>
