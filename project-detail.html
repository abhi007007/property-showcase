<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Detail</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Project Title</h1>
    </header>
    <main>
        <section id="image-gallery">
            <h2>Image Gallery</h2>
            <div class="gallery">
                <img src="image1.jpg" alt="Project Image 1">
                <img src="image2.jpg" alt="Project Image 2">
                <img src="image3.jpg" alt="Project Image 3">
                <!-- Add more images as needed -->
            </div>
        </section>
        <section id="amenities">
            <h2>Amenities</h2>
            <ul>
                <li>Pool</li>
                <li>Gym</li>
                <li>Wi-Fi</li>
                <li>Parking</li>
                <!-- List other amenities here -->
            </ul>
        </section>
        <section id="inquiry-form">
            <h2>Contact Us for Inquiry</h2>
            <form action="#" method="post">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <label for="message">Message:</label>
                <textarea id="message" name="message" required></textarea>
                <button type="submit">Submit Inquiry</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Project Showcase. All rights reserved.</p>
    </footer>
</body>
</html>
